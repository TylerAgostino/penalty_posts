kind: pipeline
name: penalties
type: docker

steps:
  - name: build
    image: plugins/docker
    settings:
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      registry: registry.hub.docker.com
      repo: registry.hub.docker.com/tyleragostino/penalty_posts
      tags: latest
      cache_from: "registry.hub.docker.com/tyleragostino/penalty_posts:latest"
    when:
      branch:
        - main
      changeset:
        includes: [ "**/**.py", "**/**.txt", "**/Dockerfile" ]
  - name: deploy
    image: plugins/webhook
    settings:
      urls: http://192.168.1.125:9996/api/stacks/webhooks/1492de4c-0f01-4a07-964b-128cd1f3d543
    when:
      changeset:
        includes: [ "**/**.py", "**/**.txt", "**/docker_compose.yaml", "**/Dockerfile"  ]

trigger:
  ref:
    - refs/heads/main
